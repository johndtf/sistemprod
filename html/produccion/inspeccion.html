<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--  <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    /> -->
    <link rel="stylesheet" href="../../css/reset.css" />
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="../../css/produccion.css" />
    <!--  <link rel="stylesheet" href="../../css/inspeccion.css" /> -->
    <title>Inspección Inicial</title>
  </head>
  <body>
    <header>
      <h1>Inspección Inicial</h1>
    </header>
    <div class="sidebar">
      <div class="logo">
        <!-- <i class="fas fa-tire"></i> -->
        <img src="../../img/rueda.png" alt="llanta" />
        <span class="span-logo">Subprocesos</span>
      </div>
      <ul class="menu">
        <li class="current">
          <a href="#" aria-label="Inspección Inicial">
            <i class="fas fa-search"></i>
            <span class="description">Inspección Inicial</span>
          </a>
        </li>
        <li>
          <a href="#" aria-label="Raspado">
            <i class="fa-solid fa-fan"></i>
            <span class="description">Raspado</span>
          </a>
        </li>
        <li>
          <a href="#" aria-label="Preparación">
            <i class="fa-solid fa-person-digging"></i>
            <span class="description">Preparación</span>
          </a>
        </li>
        <li>
          <a href="#" aria-label="Reparación">
            <i class="fas fa-tools"></i>
            <span class="description">Reparación</span>
          </a>
        </li>
        <li>
          <a href="#" aria-label="Relleno">
            <i class="fas fa-fill"></i>
            <span class="description">Relleno</span>
          </a>
        </li>
        <li>
          <a href="#" aria-label="Corte de banda">
            <i class="fas fa-cut"></i>
            <span class="description">Corte de banda</span>
          </a>
        </li>
        <li>
          <a href="#" aria-label="Embandado">
            <i class="fas fa-toolbox"></i>
            <!-- <img src="../../img/embandado.png" alt="" /> -->
            <span class="description">Embandado</span>
          </a>
        </li>
        <li>
          <a href="#" aria-label="Vulcanización">
            <i class="fas fa-fire"></i>
            <span class="description">Vulcanización</span>
          </a>
        </li>
        <li>
          <a href="#" aria-label="Inspección Final">
            <i class="fas fa-search"></i>
            <span class="description">Inspección Final</span>
          </a>
        </li>
        <li>
          <a href="#" aria-label="Terminación">
            <i class="fas fa-flag-checkered"></i>
            <span class="description">Terminación</span>
          </a>
        </li>

        <!-- Otros elementos del menú -->
      </ul>
      <div class="toggle-description">
        <i class="fas fa-info-circle"></i>
        <span class="span-toggle">Ocultar Descripción</span>
      </div>
    </div>

    <!-- Contenido principal  -->
    <div class="content">
      <!-- Sección para mostrar información de la llanta -->
      <section class="grid-section">
        <div class="form-group item">
          <label for="tiquete-info">Tiquete:</label>
          <input type="text" id="tiquete-info" name="tiquete-info" readonly />
        </div>

        <div class="form-group item double-size">
          <label for="cliente">Cliente:</label>
          <input type="text" id="cliente" name="cliente" readonly />
        </div>

        <div class="form-group item">
          <label for="orden">Orden:</label>
          <input type="text" id="orden" name="orden" readonly />
        </div>

        <div class="form-group item">
          <label for="marca">Marca:</label>
          <input type="text" id="marca" name="marca" readonly />
        </div>

        <div class="form-group item">
          <label for="dimension">Dimensión:</label>
          <input type="text" id="dimension" name="dimension" readonly />
        </div>

        <div class="form-group item">
          <label for="diseno">Diseño:</label>
          <input type="text" id="diseno" name="diseno" readonly />
        </div>

        <div class="form-group item">
          <label for="serie">Serie:</label>
          <input type="text" id="serie" name="serie" readonly />
        </div>

        <div class="form-group item">
          <label for="estadol">Estado:</label>
          <input type="text" id="estadol" name="estadol" readonly />
        </div>

        <div class="form-group item">
          <label for="nivell">Nivel reenc:</label>
          <input type="text" id="nivell" name="nivell" readonly />
        </div>

        <div class="form-group item double-size">
          <label for="resolucionl">Resolución:</label>
          <input type="text" id="resolucionl" name="resolucionl" readonly />
        </div>

        <div class="form-group item triple-size">
          <label for="observacion-inicial">Observación ini:</label>
          <input
            type="text"
            id="observacion-inicial"
            name="observacion-inicial"
            readonly
          />
        </div>
      </section>

      <div class="form-container2x1">
        <section class="grid-section">
          <div class="form-group item">
            <label for="tiquete">Tiquete:</label>
            <input type="number" id="tiquete" name="tiquete" min="1" step="1" />
          </div>

          <div class="form-group item">
            <label for="reencauches">N.Reenc.:</label>
            <input
              type="number"
              id="reencauches"
              name="reencauches"
              min="1"
              step="1"
              value="1"
            />
          </div>

          <div class="form-group item">
            <label for="operario">Operario:</label>
            <input
              type="number"
              id="operario"
              name="operario"
              inputmode="numeric"
            />
          </div>
          <div class="form-group item full-width">
            <!-- espacio para mostrar el nombre del operario -->
            <input
              type="text"
              id="operario-display"
              name="operario-display"
              readonly
              disabled
            />
          </div>

          <div class="form-group item">
            <label for="codinsp">Cod. Insp:</label>
            <select id="codinsp" name="codinsp"></select>
          </div>
          <div class="form-group item full-width">
            <!-- Eespacio para mostrar la resolución de inspección -->
            <input
              type="text"
              id="resolinspect"
              name="resolinspect"
              readonly
              disabled
            />
          </div>

          <div class="form-group item">
            <label for="fechaProceso">Fecha/Hora:</label>
            <input
              type="datetime-local"
              id="fechaProceso"
              name="fechaProceso"
            />
          </div>

          <div class="form-group item double-large-size">
            <label for="observacion">Observación:</label>
            <textarea
              id="observacion"
              name="observacion"
              placeholder="Ingrese observación..."
            ></textarea>
          </div>
        </section>
        <section class="button-group">
          <button class="inspect-llanta-btn primary-button">Actualizar</button>

          <button class="cancel-inspect-btn primary-button">Deshacer</button>
        </section>
      </div>
    </div>

    <!--  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script> -->
    <script
      src="https://kit.fontawesome.com/f3b6c3464d.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="../../js/inspeccion.js"></script>
  </body>
</html>
